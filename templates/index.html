<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold text-center text-blue-600 mb-6">
Resume Builder
</h1>

<div class="grid grid-cols-2 gap-6">

<!-- FORM -->
<div class="bg-white p-4 shadow rounded">

<input id="name" placeholder="Name" class="border p-2 w-full mb-2">
<input id="title" placeholder="Job Title" class="border p-2 w-full mb-2">
<input id="email" placeholder="Email" class="border p-2 w-full mb-2">
<input id="phone" placeholder="Phone" class="border p-2 w-full mb-2">

<textarea id="summary" placeholder="Summary" class="border p-2 w-full mb-2"></textarea>

<button onclick="saveData()" class="bg-blue-500 text-white px-4 py-2 rounded">
Save Resume
</button>

<button onclick="downloadPDF()" class="bg-green-500 text-white px-4 py-2 rounded ml-2">
Download PDF
</button>

</div>

<!-- PREVIEW -->
<div id="preview" class="bg-white p-4 shadow rounded">

<h2 id="pname" class="text-xl font-bold">Your Name</h2>
<p id="ptitle">Job Title</p>
<p id="pemail">Email</p>
<p id="pphone">Phone</p>
<p id="psummary">Summary...</p>

</div>

</div>

<script>

// LIVE PREVIEW
document.getElementById('name').oninput = e =>
    document.getElementById('pname').innerText = e.target.value;

document.getElementById('title').oninput = e =>
    document.getElementById('ptitle').innerText = e.target.value;

document.getElementById('email').oninput = e =>
    document.getElementById('pemail').innerText = e.target.value;

document.getElementById('phone').oninput = e =>
    document.getElementById('pphone').innerText = e.target.value;

document.getElementById('summary').oninput = e =>
    document.getElementById('psummary').innerText = e.target.value;


// SAVE TO BACKEND
function saveData() {

    const data = {
        name: document.getElementById('name').value,
        title: document.getElementById('title').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        summary: document.getElementById('summary').value
    };

    fetch('/save-resume', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => alert("Saved: " + data.file));
}


// DOWNLOAD PDF
function downloadPDF() {

    const { jsPDF } = window.jspdf;

    html2canvas(document.getElementById('preview')).then(canvas => {

        const imgData = canvas.toDataURL('image/png');

        const pdf = new jsPDF();
        pdf.addImage(imgData, 'PNG', 10, 10);
        pdf.save("resume.pdf");

    });
}

</script>

</body>
</html>
